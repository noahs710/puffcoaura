version: 1
plan:
  name: 'Simplify PuffcoBLE — strip ble-client.js and app.js to a minimal working set'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: 'simplify-ble-client'
    title: 'Rewrite ble-client.js to a minimal, readable form'
    prompt: |
      Rewrite `C:\PuffcoBLE\ble-client.js` as a dramatically smaller, readable file that still connects to BOTH the Puffco Peak Pro and the Puffco Proxy through Web Bluetooth.

      ## Context
      The current file is ~1,800 lines, much of it Peak-Pro-specific guessing, over-engineered CBOR mood-light encoding, draw-strength auto-detection, dynamic-inhale baselines, per-path candidate walks, etc. The user reports the Proxy connects but most information is wrong, and the code is "very very convoluted." Your job is to throw out the bloat and ship a clean baseline.

      ## Hard requirements
      1. **Single class `PuffcoBrowserBleClient`** exposed as `window.PuffcoBrowserBleClient`. Construct it without arguments.
      2. **Connection flow** (one `connect()` method, called from app.js's Connect button):
         - Open the browser chooser with `acceptAllDevices: true` and `optionalServices: [LORAX_SERVICE]` so the Proxy shows up.
         - `gatt.connect()` → `getPrimaryService(LORAX_SERVICE)` → fetch VERSION_CHAR, COMMAND_CHAR, REPLY_CHAR in parallel.
         - Start notifications on REPLY_CHAR, register the reply handler.
         - Run `auth()` (Lorax unlock) — keep the existing GET_ACCESS_SEED / UNLOCK_ACCESS + SHA-256 + LORAX_KEY logic. The unlock is the actual proof the device is a Puffco.
         - Read device identity (try `/p/sys/fw/api` CBOR first; fall back to `/p/sys/hw/ser`, `/p/sys/fw/ver`, `/u/sys/name` if it fails — the Proxy doesn't expose the rich CBOR blob).
         - Validate: accept if product is "peach"/"pearl"/"peakpro"/"proxy"/"core", OR if Lorax unlocked and the heuristic finds "proxy" / "peak pro" / "pearl" / "peach" tokens in the marketing name / device name / serial. Reject only if there is literally no readable Puffco path.
         - On validation failure, disconnect + return `{ type: 'error', message, data: { identity, supported_devices } }`.
         - On success, return `{ type: 'connected', message, data: <snapshot> }`.
      3. **`snapshot(full)`** — read a fixed list of paths and return a flat plain-object the UI can render. Required keys: `connected`, `transport: 'browser_ble'`, `name`, `firmware`, `serial`, `state`, `battery`, `current_profile`, `active_profile_name`, `active_profile_temp_f`, `active_profile_time_s`, `current_temperature_c`, `current_temperature_f`, `target_temperature_c`, `target_temperature_f`, `dabs_per_day`, `dabs_left`, `total_dabs`, `lantern`, `stealth`, `device_label`, `device_identity`, `profiles: [{ index, name, temp_f, time_s, color_hex, active }]`. Use `safe()` so one failed read doesn't tank the whole snapshot. **Read only paths that are valid on BOTH Peak Pro and Proxy** — no /p/htr/chmt, no /p/app/info/drem, no /p/bat/chg/etf on the Proxy if those paths don't work there. If a path fails, return `null` for that field, don't fake a value.
      4. **Commands** the UI needs (each returns `{ type: 'ok', message, data: snapshot }`):
         - `heat()`, `stop()`, `boost()` — write to `/p/app/mc`.
         - `selectProfile({ index })` — write to `/p/app/hcs`.
         - `setProfile({ index, name?, temp_f?, time_s? })` — write to `/u/app/hc/<i>/name|temp|time`. If `select` is true, also write to `/p/app/hcs`. Use the existing `writeShort` and `packFloat32` helpers.
         - `setColor({ index?, hex })` — read active profile, write a tiny CBOR color blob to `/u/app/hc/<i>/colr`. Keep it minimal: just `{ lamp: { name: 'pikaled2', param: { bright: 255, anim: 1, plNum: 0, plDenom: 1, color: [<r>,<g>,<b>], colorLen: 3, offset: [0,0,...] } } }`. Use the existing `cborEncode` / `hexifyForCbor` helpers — keep those helpers, just stop carrying six mood presets.
         - `setBrightness({ base, mid, glass, logo })` — write `/u/app/ui/lbrt`.
         - `setLantern({ on })`, `setStealth({ on })` — write `/p/app/ltrn/cmd`, `/u/app/ui/stlm`.
         - `disconnect()` — clean teardown.
      5. **Keep these helpers** (you'll need them): `runQueued`, `runCommand`, `readShort`, `writeShort`, `readUint8`, `readInt8`, `readFloat32`, `readText`, `readBytesAll`, `packFloat32`, `cToF`, `fToC`, `decodeCbor`, `cborEncode`, `hexToRgb`, `rgbToHex`, `hexifyForCbor`, `readDeviceIdentity`, `validateDevice`, `labelFromHeuristics`, `safe`.
      6. **Remove** (do not port any of this): MOOD_PRESETS, NO_ANIMATION_OFFSETS, DISCO_BASE_OFFSETS, SPLIT_OFFSETS_*, VERTICAL_SLIDESHOW_OFFSETS, `moodLightPayload`, `colorTable`, `moodSpeed`, `moodOffsets`, `setMoodLight`, `setLanternColor`, `reorderProfiles`, `drawStrengthModeForPath` auto-promotion, `observeDrawStrengthPaths`, the `DRAW_STRENGTH_*` candidate walks, the `dynamicInhaleBaselinePercent` state, the localStorage `puffco_draw_strength_source` key handling, `loraxRead`/`loraxWrite`/`loraxProbe`/`loraxObserve`/`loraxAction` debug tools, `temperatureSource` debug, `setBoostOptions` (move to inline), `officialAttributes` debug, `registry` static path list, the `ACTION_COMMANDS` and `MODE_COMMANDS` indirection (use literal values inline in the command methods).
      7. **Static constants to keep**: `LORAX_SERVICE`, `VERSION_CHAR`, `COMMAND_CHAR`, `REPLY_CHAR`, `LORAX_KEY`, `OPCODES` (READ_SHORT, WRITE_SHORT, GET_ACCESS_SEED, UNLOCK_ACCESS), `STATE_NAMES`, `CHARGE_LABELS`, `SUPPORTED_DEVICES`.
      8. **No Node-only code. No build step. Browser-only.** The file is loaded as a classic `<script>` in `index.html` after `app.js`'s `<script>` — actually, check `index.html` and load it BEFORE `app.js` if it isn't already. `node --check C:\PuffcoBLE\ble-client.js` must pass.
      9. **Style**: short functions, no nested ternaries, no over-commenting. Section dividers (`// ---- Section ----`) are fine. Aim for ~500–700 lines, never over 900.

      ## Files
      - Input: `C:\PuffcoBLE\ble-client.js` (read fully), `C:\PuffcoBLE\index.html` (read to confirm load order), `C:\PuffcoBLE\app.js` (skim the parts that call `handleCommand` so you know which command names to expose).
      - Output: rewrite `C:\PuffcoBLE\ble-client.js` in place. Don't touch the other files.

      ## Stop condition
      - File parses: `node --check C:\PuffcoBLE\ble-client.js` exits 0.
      - File size is meaningfully smaller (target: under 30KB / ~700 lines; hard ceiling 900 lines).
      - `PuffcoBrowserBleClient` is exposed on `window` with `connect`, `disconnect`, `snapshot`, `heat`, `stop`, `boost`, `selectProfile`, `setProfile`, `setColor`, `setBrightness`, `setLantern`, `setStealth`, `scanDevices` (returns the chooser hint), and an `onDisconnected` callback setter. `supported()` and `connected` getter are also there.
      - Report: line count before/after, list of removed sections, list of kept methods, and any path that you suspect the Proxy still won't have (so the next task can decide how to render missing fields).
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      Independently verify the rewritten `C:\PuffcoBLE\ble-client.js`:

      1. Run `node --check C:\PuffcoBLE\ble-client.js`. Must exit 0.
      2. Confirm the file is meaningfully smaller. Old was ~80KB / ~1,800 lines. New must be under 30KB / 900 lines. Report exact bytes + line count.
      3. Grep the new file for these symbols — none of them should appear (they were explicitly removed): `MOOD_PRESETS`, `NO_ANIMATION_OFFSETS`, `DISCO_BASE_OFFSETS`, `SPLIT_OFFSETS_2`, `SPLIT_OFFSETS_3_4`, `SPLIT_OFFSETS_5_6`, `VERTICAL_SLIDESHOW_OFFSETS`, `moodLightPayload`, `moodOffsets`, `moodSpeed`, `setMoodLight`, `setLanternColor`, `observeDrawStrengthPaths`, `dynamicInhaleBaseline`, `puffco_draw_strength_source`, `loraxRead`, `loraxWrite`, `loraxProbe`, `loraxObserve`, `loraxAction`, `officialAttributes`, `temperatureSource`, `reorderProfiles`, `setBoostOptions`. (Skip this check if the producer replaced one of these names with a different but equivalent implementation — flag it but don't auto-fail.)
      4. Confirm `window.PuffcoBrowserBleClient` is still assigned, the class still has the kept methods (connect, disconnect, snapshot, heat, stop, boost, selectProfile, setProfile, setColor, setBrightness, setLantern, setStealth, supported, scanDevices), and the Lorax unlock still uses SHA-256 with the static LORAX_KEY.
      5. Confirm `connect()` uses `acceptAllDevices: true` and that `validateDevice()` accepts the Proxy via heuristic (search for `proxy` / `peak pro` / `pearl` patterns in the validator or its helpers).
      6. Confirm the snapshot only reads paths that exist on both Peak Pro and Proxy. Open `app.js` and look at which fields of `snapshot()` are read by the UI — every field the UI consumes must be in the new snapshot.
      7. PASS if all of the above hold. Otherwise FAIL with the specific symbol / line that breaks.
    max_retries: 2

  - id: 'simplify-app'
    title: 'Rewrite app.js to a minimal, readable PWA shell'
    prompt: |
      Rewrite `C:\PuffcoBLE\app.js` as a dramatically smaller, readable PWA that consumes the simplified `ble-client.js` and works for both Puffco Peak Pro and Puffco Proxy.

      ## Context
      The current `app.js` is ~6,000 lines. It's accumulated: complex profiles UI with drag-and-drop and color mood editors, draw-strength auto-detection, draw-sensor visualizer, dynamic-inhale baselines, profile reordering, lantern mood lights, brightness per-channel, deep Bluetooth chooser help, bridge/WebSocket fallback, scan animation, voice prompts, etc. Most of this was Peak-Pro-specific. The user wants it gone.

      ## What app.js MUST do
      1. **Top-of-page status card**: device name, model label ("Puffco Peak Pro" / "Puffco Proxy" / "Puffco (unidentified)"), firmware, serial, battery %, state, current temp °F.
      2. **Profile selector**: 4 cards (or a dropdown — your call, keep it simple). Click a card to select it. Each card shows name, temp °F, duration, color swatch.
      3. **Profile editor**: when a profile is selected, an inline form lets the user edit name, temp (°F), duration (seconds). Save button calls `setProfile({ index, name, temp_f, time_s, select: true })`.
      4. **Color picker**: a single `<input type="color">` that calls `setColor({ index, hex: <value> })` for the active profile.
      5. **Action buttons**: Heat, Stop, Boost, Lantern On/Off, Stealth On/Off. Disable them while disconnected.
      6. **Brightness slider**: a single 0–255 slider that sets all four channels to the same value via `setBrightness({ base, mid, glass, logo })`.
      7. **Connect / Disconnect button** that calls `getBrowserBle().handleCommand('connect')` / `('disconnect')` and renders the response.
      8. **Toast** on success/error using the existing toast helper if it survived, else a tiny inline one.
      9. **Polling loop** while connected: every 2 seconds, call `handleCommand('status')` (or directly call `getBrowserBle().snapshot(false)`) and re-render the status card.

      ## Hard requirements
      - Single `<script>` block (or one top-level IIFE), no modules, no build step.
      - No jQuery, no React, no framework. Vanilla JS.
      - `node --check C:\PuffcoBLE\app.js` must pass.
      - Don't touch `index.html` or `style.css` except possibly to add a single class hook for the new UI — actually, **don't touch them at all**. Work with whatever element IDs already exist in `index.html`. If an element ID you need doesn't exist, render into a single `<div id="puffco-shell">` you create at the bottom of `<body>` via JS. Or, if simpler, add the missing IDs to `index.html` and only the minimum CSS hooks to `style.css`. But: do NOT do a full UI redesign.
      - The simplified `ble-client.js` (the other task in this plan) is the contract. Read it before writing. Use exactly the method names it exposes.
      - Handle the case where the user picks a non-Puffco device: surface the validation error message in a toast and stay disconnected.
      - Handle disconnect (manual or GATT): clear the UI back to the disconnected state.

      ## What to REMOVE (do not port)
      - All `start.bat` / `python` / `puffcussy.py` references — those are gone.
      - WebSocket bridge mode — drop the entire `connectBridge`, `initWebSocket`, `defaultBridgeUrl` machinery.
      - Profile drag-and-drop reordering UI.
      - Mood-light editor and its 6 presets UI.
      - Draw-sensor visualizer / heat-probe lab UI.
      - Profile card ordering icon.
      - Voice Bluetooth prompt.
      - Scan animation.
      - Anything that talks to `lorax_registry`, `lorax_read`, `lorax_write`, `lorax_observe`, `lorax_probe`, `lorax_action`, `temperature_source`, `draw_strength_source`, `draw_strength_observe`, `official_attributes`, `heat_probe`.
      - The huge `setText('ble-capability-copy', ...)` block and the "expand ble capability" panel — replace with one line of plain text under the Connect button.

      ## Files
      - Input: `C:\PuffcoBLE\app.js` (skim, don't read the whole 6,000 lines), `C:\PuffcoBLE\ble-client.js` (read the new one in full — this is your contract), `C:\PuffcoBLE\index.html` (read to know what IDs exist), `C:\PuffcoBLE\style.css` (skim).
      - Output: rewrite `C:\PuffcoBLE\app.js` in place. If you must add a new `<div id="puffco-shell">` to `index.html` because no shell container exists, that's allowed; document it in your final report.

      ## Stop condition
      - File parses: `node --check C:\PuffcoBLE\app.js` exits 0.
      - File size is meaningfully smaller (target: under 30KB / ~800 lines; hard ceiling 1,200 lines).
      - All the MUST-DO items above are present and working.
      - Report: line count before/after, list of removed sections, list of UI elements rendered, and the method names from the new ble-client.js that you actually call.
    assigned_to: coder
    depends_on: ['simplify-ble-client']
    verified_by: verifier
    verify_prompt: |
      Independently verify the rewritten `C:\PuffcoBLE\app.js`:

      1. Run `node --check C:\PuffcoBLE\app.js`. Must exit 0.
      2. Confirm the file is meaningfully smaller. Old was ~244KB / ~6,000 lines. New must be under 30KB / 1,200 lines. Report exact bytes + line count.
      3. Grep the new file for these symbols — none should appear: `connectBridge`, `initWebSocket`, `defaultBridgeUrl`, `bridgeUrl`, `setBridgeNote`, `expandBleCapability`, `ble-capability-copy`, `loraxRegistry`, `loraxRead`, `loraxWrite`, `loraxProbe`, `loraxObserve`, `loraxAction`, `setMoodLight`, `moodLight`, `puffco_draw_strength_source`, `MOOD_PRESET`, `drawStrengthObserve`, `dynamicInhale`. (Skip if the producer renamed — flag but don't auto-fail.)
      4. Confirm the UI exposes: connect/disconnect button, status card (name/model/firmware/serial/battery/state/temp), profile selector (4 profiles), profile edit form (name/temp/time), color picker, Heat/Stop/Boost buttons, brightness slider, lantern/stealth toggles.
      5. Confirm the polling loop calls something equivalent to `handleCommand('status')` or `getBrowserBle().snapshot(false)` every couple seconds while connected.
      6. Open the new `ble-client.js` and confirm every method the app calls is actually exposed by the client. List the methods the app calls. If any are missing, FAIL.
      7. Read `index.html`. Confirm the JS uses existing IDs where possible, or that any new container added is documented in the producer's report.
      8. PASS if all of the above hold. Otherwise FAIL with the specific line / symbol that breaks.
    max_retries: 2
