version: 1
plan:
  name: 'Puffco PWA — Mac-style clean transparent look + light mode toning + unstyled component styling'
  max_concurrency: 2
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: 'mac-style-refresh'
    title: 'Refactor Puffco PWA to a Mac-style clean transparent look with usable light mode and fully styled native form controls'
    assigned_to: coder
    verified_by: verifier
    max_retries: 2
    prompt: |
      You are working on a single-page PWA at C:\PuffcoBLE. Stack is plain HTML/CSS/JS
      (no build step). Files of interest:
        - index.html  (UI structure, 963 lines)
        - style.css   (design system, 4676 lines, ~100KB)
        - app.js      (controller)
        - ble-client.js (BLE layer)
        - manifest.json
        - sw.js

      The user has three concrete asks. Do all three, in this order of priority.
      Do NOT modify app.js or ble-client.js unless something is strictly required for
      the visual goals below — they already work.

      ============================================================
      GOAL 1 — "Much more Mac-like clean transparent look"
      ============================================================
      Read the current design and re-tune it toward a clean, modern macOS (Big Sur /
      Sonoma / Sequoia) aesthetic. Specifically:

      - Body background: kill the over-saturated colored radial halos. Replace with
        a soft, near-monochrome Apple-style mesh: a very subtle blue/teal wash in
        one corner, very low opacity, no rainbow conic-gradient feel. Reference
        the macOS Sonoma wallpaper blur. Background must read as a calm neutral
        (dark gray with a hint of blue in dark, near-white with a hint of warm
        gray in light) — NOT a "neon party".

      - Cards / surfaces: lean into "liquid glass". Use:
          * Higher blur (blur(40px) saturate(1.6) is a good starting point)
          * Lower surface opacity (cards ~0.42-0.55, not 0.78+)
          * Hairline 1px border with the same alpha across surfaces
          * No big colored glows on cards. Inner highlight on top edge is fine.

      - Buttons (.btn): pill shape (already is — keep), more refined:
          * .btn-primary should be the system-style "filled" look — solid white
            pill in light mode, white-with-low-alpha pill in dark mode, with
            subtle inner highlight. NOT a high-contrast gradient.
          * .btn-secondary is a low-alpha glass pill with a hairline border.
            Hover should be a soft brightness lift, not a colored border jump.
          * .btn-heat is the only "loud" button — gold→orange→red is fine, keep.
          * Add focus-visible ring using accent color.

      - Remove the big color-saturated conic-gradient halo on .device-halo and the
        animated "breathe" keyframe. Replace with a calm soft glow that matches
        accent.

      - Slim down shadows: macOS uses very soft, large-radius, low-opacity shadows.
        Replace hard `0 20px 40px -16px rgba(0,0,0,0.5)` style with something like
        `0 30px 60px -20px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.06) inset`.

      - Typography: keep Inter, but increase letter-spacing tightening slightly
        on display sizes; ensure headings use a slightly higher line-height
        for that Apple feel. Keep all-caps for stat labels but bump letter-spacing
        a touch.

      - Header: simplify the title block. "Puffco BLE" is fine; remove the busy
        multi-layer halo background. Make it a clean translucent bar.

      - All animations should be Apple-cubic-bezier (0.32, 0.72, 0, 1) — already
        defined. Honor existing tokens, don't invent new easings.

      ============================================================
      GOAL 2 — "Make light mode usable and not a flashbang"
      ============================================================
      Right now light mode is a wall of bright white. Fix the light token block so:

      - --bg-deep: change from #e8edf2 to something around #eceef1 or #eef0f3
        (slightly cool, NOT pure white).
      - --bg-mid:  #f3f5f8
      - --bg-end:  #e6e9ee
      - --bg-card: rgba(255,255,255,0.55) (reduce to ~0.5) with HIGHER blur
        so the underlying gradient doesn't show through garishly.
      - --bg-glass, --bg-glass-hover, --bg-glass-strong: nudge to be slightly
        less white (mix a tiny amount of neutral gray) so glass on glass doesn't
        bloom out.
      - --text-primary: keep dark but soften to #1d1d1f (Apple's "label" color).
      - --text-secondary: #515154
      - --text-muted: #86868b
      - --border-subtle: rgba(0,0,0,0.06)
      - --border-glass: rgba(0,0,0,0.08)
      - --shadow-card: small, soft, neutral (no blue/teal tint)
      - Accent colors: keep teal as default but make it more "system" — try
        #008c8c or Apple's exact systemBlue-style #007aff family? No, keep the
        teal as a brand accent (don't change hue), just darken slightly for
        AA contrast on light bg. Suggested:
          accent-teal: #008b85
          accent-violet: #6d28d9
          accent-pink: #be123c
          accent-orange: #c2410c
          accent-red: #b91c1c
          accent-green: #15803d
          accent-cyan: #0369a1
          accent-gold: #b45309

      - Body background gradient in light: NO bright pastel halos. Use either a
        very subtle linear gradient (top: #eef0f3 → bottom: #e3e6eb) or remove
        the radial halos entirely in light mode. Recommended: keep one very
        faint blueish radial top-right at 8% opacity, drop the rest.

      - All translucent surfaces in light mode need stronger contrast for the
        text on top of them. Audit each .card, .stat-item, .battery-panel,
        .metric-card, .advanced-panel, .theme-popover, .scan-result, .voice-*,
        .lorax-*, .profile-card, .modal and verify text contrast is comfortable
        on the resulting effective background.

      - The .body::before / body::after overlay layers currently pile up. Pick
        ONE (probably ::after) and use it just for a top-edge inner highlight
        + subtle bottom vignette. Remove the duplicate.

      ============================================================
      GOAL 3 — "Style all dropdown boxes and other unstyled components"
      ============================================================
      Audit the rendered page in both themes for native widgets that look out of
      place. Style each one to match the design system.

      Items to address (search for them in index.html and style.css):

      A) <select> dropdowns — these show OS-native styling when opened. Two
         approaches (pick the simpler one that works):
           (a) Use appearance: none + a custom chevron SVG via background-image,
               styled to match the input. Keep `color-scheme` set per theme.
           (b) Build a minimal custom dropdown using a <details>/<summary>
               popover. Only do this if (a) leaves obvious ugliness.
         Default to (a). Use the design tokens for background, border, radius,
         padding. Add a small ▾ chevron on the right.

      B) <input type="number"> spinners — WebKit shows ugly up/down arrows.
         Hide with `appearance: none; -webkit-appearance: none;` and ensure
         padding is still comfortable.

      C) <input type="range"> — already partly styled. Make sure thumb and
         track are themed in both light and dark, including the
         `::-webkit-slider-runnable-track` and `::-moz-range-track`. Thumb
         should be a clean filled circle, not a square. Add hover/focus state.

      D) <input type="color"> — styled at line ~2321. Verify it looks like a
         refined macOS color well (rounded, hairline border, subtle inset
         shadow). Don't break the color picker itself.

      E) <input type="checkbox"> — currently uses `accent-color: var(--accent-teal)`
         which is fine but a bit flat. Optional: build a custom checkbox to
         match the iOS look (rounded square, accent fill with white check).
         Keep simple. If you build custom, do it without breaking form values.

      F) <details> / <summary> — used in the Advanced panel and the
         .backend-json-panel. The default disclosure triangle is OS-native.
         Style it: hide the default marker, use a custom ▸ / ▾ rotated
         chevron via ::before or background SVG.

      G) ::placeholder — make it slightly more visible in light mode
         (currently var(--text-muted) which is too gray on white). Bump to
         a darker neutral.

      H) ::selection — add a styled text selection using accent color at low
         opacity so it doesn't clash.

      I) Scrollbars (WebKit) — style with `::-webkit-scrollbar`,
         `::-webkit-scrollbar-thumb`, `::-webkit-scrollbar-track` to use the
         glass system. Thin, rounded, low-opacity.

      J) <input type="file"> (the hidden ones in the profile import flow) —
         keep hidden, no need to style.

      K) Native focus rings — ensure EVERY interactive element has a visible
         :focus-visible ring using accent color at ~30% alpha. Already partly
         done; audit and fill gaps (the .scan-result, .theme-option, sliders,
         checkboxes, summary).

      L) Autofill — add `input:-webkit-autofill` styles so saved values don't
         show OS yellow. Use `box-shadow: 0 0 0 1000px var(--bg-input) inset;`
         and force `caret-color` + `color`.

      M) Disabled state — verify .btn:disabled, input:disabled, and any
         disabled options look correctly muted in BOTH themes.

      ============================================================
      CONSTRAINTS
      ============================================================
      - All theme tokens live in :root[data-theme="dark"] / :root[data-theme="light"]
        and the auto @media block. Update ALL THREE blocks consistently for
        light mode; do not change dark mode values unless they share a token
        with light.
      - The CSS file is already huge. Don't append a separate "patch" file —
        edit style.css in place. Use the Edit tool, not Write, so the diff
        is small.
      - Don't change the HTML structure unless absolutely required to add
        a class or data attribute. The user has shipped this UI already.
      - Preserve ALL existing JS hooks (class names, ids, data-attributes).
        Adding new classes is fine; removing or renaming is not.
      - The app has a hidden light-mode flash on initial load (FOUC). The
        <link rel="stylesheet"> for style.css is loaded synchronously with
        `?v=2`. If you change nothing else, at minimum bump the cache-bust
        to `?v=3` in index.html so the new CSS loads on reload.
      - Verify visually by serving the folder with the existing http-server
        (see http-server.out.log for the running port) and using a headless
        browser. Take screenshots in BOTH light and dark mode and include
        the file paths in your final report. Save screenshots to
        C:\PuffcoBLE\tools\mac-style-light.png and ...dark.png.

      ============================================================
      DELIVERABLES
      ============================================================
      1. style.css edited in place (with cache-bust bumped in index.html).
      2. index.html updated ONLY for the cache-bust and any class additions
         strictly required for the styling (e.g. adding a class to a <select>
         is OK; rewriting markup is not).
      3. Two screenshots (light + dark) saved at tools/mac-style-light.png
         and tools/mac-style-dark.png.
      4. A short report (≤300 words) listing: changed files, the exact token
         values you changed, the list of unstyled components addressed, and
         the screenshot paths.

      Use the mini-coder-max skill if it helps you plan the diff, but stay
      scoped — this is one focused refactor, not a multi-phase rewrite.
    verify_prompt: |
      You are verifying a Mac-style visual refresh of the PuffcoBLE PWA at
      C:\PuffcoBLE. The producer (coder) was asked to:
        1. Make the design feel like a clean, modern macOS UI
        2. Fix light mode so it isn't a "flashbang"
        3. Style all unstyled native form controls (selects, ranges, color
           pickers, checkboxes, details/summary, scrollbars, autofill, etc.)

      Do these checks IN ORDER. PASS only if all pass.

      CHECK 1 — Open style.css and confirm:
        - The light theme block (`:root[data-theme="light"]`) has been softened:
          --bg-deep is no longer pure white/near-white, --text-primary uses a
          dark gray like #1d1d1f (or similar), accents are darkened to AA-grade
          contrast on the new light bg.
        - The auto @media block for light was updated to match.
        - Dark mode tokens were NOT regressed (dark still dark, just cleaner).
        - New vendor styles exist for: select (with custom chevron), range
          (webkit + moz thumb/track), checkbox, details/summary, scrollbar,
          autofill, ::selection, ::placeholder.
        - index.html's stylesheet link was bumped (e.g. `?v=3` or higher).

      CHECK 2 — Serve the folder. There's a `http-server` log at
      http-server.out.log showing the port. Or just run:
        `cd C:\PuffcoBLE; npx http-server -p 8723 -c-1 .`
      Then use the Playwright MCP (mcp call playwright ...) to:
        a) Navigate to http://127.0.0.1:8723/ in BOTH light and dark theme.
           Toggle theme via the gear icon → Light/Dark/Auto to confirm it
           actually applies data-theme on <html>.
        b) Screenshot both at viewport 1280x900. Save to
           C:\PuffcoBLE\tools\verify-light.png and verify-dark.png.
        c) In light mode, the page should NOT be a white wall. Text should be
           comfortable to read, no glaring white blocks, accent colors should
           be readable on the surface.
        d) In dark mode, no element should appear unstyled (look for default
           white selects, default white checkboxes, OS scrollbars).
        e) Open at least one <select> dropdown (you can use evaluate() to
           click it) and verify the visible state still looks themed. Native
           OS dropdown option lists are an acceptable limitation; the closed
           control MUST be styled.
        f) Check a <details> element (the "Advanced diagnostics" or a JSON
           panel) — the disclosure marker should be a custom chevron, not the
           OS triangle.
        g) Check the body background in light mode: it should be a soft
           neutral, not a saturated pastel explosion.

      CHECK 3 — Run a quick contrast sanity check on the light theme:
        - background var(--bg-deep) effective vs var(--text-primary) should
          have a contrast ratio > 7:1 (use any quick checker or just
          eyeball — both should be neutral grays with sufficient separation).
        - background var(--bg-card) effective vs var(--text-primary) should
          have contrast > 4.5:1.

      CHECK 4 — Do NOT pass if:
        - Dark mode was broken in the process
        - Light mode is still pure white in body or cards
        - Selects or details still use OS default markers
        - Any interactive element lacks a :focus-visible ring
        - Screenshots weren't produced
        - You found JS errors in the browser console

      REPORT: write a verdict (PASS / FAIL) with the screenshot paths you
      generated, the exact list of checks that failed (if any), and a
      one-paragraph summary of the visual state. If FAIL, list each fix the
      producer must apply. Do NOT modify any project files.
