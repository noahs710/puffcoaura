version: 1
plan:
  name: 'Puffco PWA — draw sensor (idle+heat), card drag-reorder with persistence, animation polish, alignment, kill fake Puffco graphic'
  max_concurrency: 2
  max_consecutive_failures: 2
  max_cycles: 6
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: 'revamp-and-sensor'
    title: 'Draw sensor (idle+heat), draggable card reorder with persistence, snappy transitions, alignment/overlap fix, remove fake Puffco graphic'
    prompt: |
      You are working on a single-page PWA at C:\PuffcoBLE. Stack is plain HTML / CSS / JS,
      no build step, deployed to GitHub Pages (so the served output is the same files on disk —
      NO SCSS / Sass / Less compilation, NO Node build pipeline). If you want to organize CSS,
      split style.css into multiple flat .css files linked from index.html. Do NOT introduce
      a build step. The user has explicitly accepted "keep flat CSS" because Pages can't run
      a compiler.

      Files of interest:
        - index.html  (UI structure)
        - style.css   (design system, ~106KB)
        - app.js      (controller, ~222KB — read it carefully, this is where draw sensor and
                       card layout live)
        - ble-client.js (BLE layer — read-only unless strictly required)
        - manifest.json, sw.js, tools/ (Playwright test scripts and server.py)

      The Mac-style refresh from the previous cycle is already merged (style.css at ?v=N,
      tokens updated, native form controls styled). Don't undo it. BUILD ON TOP of it.

      ============================================================
      ASK 1 — Draw sensor must work while IDLE AND while HEATING
      ============================================================
      Read app.js to find the draw sensor / bowl resistance code path. There is an existing
      "Draw" sensor panel and probably a "Heating" panel. Right now, draw only registers in
      one state. The user wants the draw sensor reading (and visual feedback) to be live
      and responsive in BOTH of these cases:
        a) When the device is idle / connected but not heating
        b) While the device is actively heating a bowl

      Implementation notes:
        - Do NOT change the BLE protocol or characteristic reads. Use whatever notification
          or polling is already in place; just make sure the UI shows the draw value on the
          right update path.
        - If draw resistance comes from a notification, the handler probably checks the
          current "state" before applying the value. REMOVE that gate so the value is shown
          in both idle and heat states.
        - If the draw panel is hidden during heating, unhide it (or move it so it stays
          visible). The user wants to see draw response in real time while the heat cycle
          is running.
        - The draw sensor visual should also show a "drawing" pulse / waveform / ring fill
          proportional to resistance change in both states. If the animation only fires
          in one state, fix that too.
        - Don't break other sensors (temp, battery, etc.). Make the minimum change that
          achieves both states working.

      ============================================================
      ASK 2 — Reorder UI, draggable cards, persistence
      ============================================================
      The user wants to rearrange cards on the main page and have the order SURVIVE reload.

      Scope:
        - Identify the major "cards" / panels on the main view (draw sensor, temperature,
          battery, profile / mode, heat controls, advanced diagnostics, lorax, etc.).
          The exact list of "user-reorderable" cards is up to you — pick the main 4-6.
        - Add a drag handle (grab cursor) on each reorderable card. Drag-and-drop to
          reorder. Use HTML5 drag-and-drop API or a tiny custom pointer-based handler
          (no library — the project has no bundler and the user doesn't want one).
        - Save the order in localStorage under a versioned key like
          'puffco.cardOrder.v1' as a JSON array of card ids.
        - On load, read localStorage and apply the saved order to the DOM. If the stored
          array is missing / empty / invalid, fall back to the current hardcoded order.
        - Add a "Reset layout" button somewhere reasonable (gear menu, or the bottom of
          the card stack). Clearing localStorage and re-rendering is fine.
        - Use existing CSS tokens. The drag affordance should be subtle (cursor: grab /
          grabbing, maybe a slight scale on the dragged card). Don't add big new icons.
        - This must work on desktop AND mobile (touch). HTML5 drag-and-drop is desktop-
          only — for touch, implement a small pointer-based fallback (pointerdown /
          pointermove / pointerup with hit-testing) OR use a tiny library if you can
          inline it. Preferred: hand-rolled pointer handler, ~80-150 lines.

      ============================================================
      ASK 3 — Beautiful, snappy transitions and animations
      ============================================================
      Build on the existing cubic-bezier(0.32, 0.72, 0, 1) tokens.
        - Audit existing transitions: any that are too long (>= 500ms), too slow at the
          start (ease-in instead of the Apple curve), or non-snappy — tighten them.
          Aim for 180-280ms for UI affordances, 350-450ms for entrances, 120-180ms for
          hover/press feedback. Use the Apple curve.
        - Add subtle micro-interactions where missing:
            * button press: scale(0.97) + brightness shift, 120ms
            * card hover: tiny lift (translateY(-2px)) + brighter glass, 220ms
            * tab / mode switch: content cross-fade with a 6-10px slide, 280ms
            * draw sensor pulse: scale + opacity ring on each draw event, 320ms
        - Use will-change / transform / opacity ONLY (compositor-friendly). Don't animate
          width/height/top/left on hot elements.
        - Respect prefers-reduced-motion: wrap non-essential animations in
          @media (prefers-reduced-motion: reduce) and replace with instant or a 1-frame
          crossfade.

      ============================================================
      ASK 4 — Alignment, no overlaps
      ============================================================
      Open the page at 1280x900 and at 390x844 (iPhone 14 Pro). Check for:
        - Cards overflowing their container
        - Text clipped behind other elements
        - Stat numbers overlapping with labels
        - Modals / popovers positioned off-screen
        - Draw sensor visual overlapping the heat ring

      Fix anything you find. Don't add a max-width clamp that breaks mobile.

      ============================================================
      ASK 5 — Remove the fake Puffco graphic
      ============================================================
      There is a fake Puffco device image / SVG / CSS-painted shape somewhere on the page
      (probably in the header or as a hero element). The user says it doesn't look like
      a real Puffco. Find it and REMOVE it. If it's an <img>, an <svg>, a CSS background,
      or a div painted with gradients — delete it cleanly. The page should look fine
      without it; the device status text + state badge + heat ring is enough.

      ============================================================
      CONSTRAINTS
      ============================================================
        - Plain HTML / CSS / JS. No bundler, no SCSS, no JSX, no framework.
        - GitHub Pages serves the files as-is. If you split CSS, do it into multiple
          flat .css files linked from index.html with normal <link rel="stylesheet"> tags.
        - Preserve ALL existing JS hooks (class names, ids, data-attributes). Adding
          new classes / data-* / aria-* is fine. Renaming or removing is not.
        - Don't regress the Mac-style refresh (light mode, native form controls, glass
          surfaces, hairline borders) from the previous cycle.
        - Don't regress the BLE / sensor functionality.
        - index.html: bump the style.css cache-bust (e.g. ?v=4 → ?v=5) so reloads
          pick up the new CSS.
        - localStorage versioned key: 'puffco.cardOrder.v1' (bump version if schema changes).

      ============================================================
      DELIVERABLES
      ============================================================
        1. All file changes merged on disk.
        2. Bump index.html cache-bust to ?v=5 (or higher).
        3. ONE Playwright smoke run, saved to tools/revamp-smoke.json — just enough to
           prove the page renders, cards are reorderable, and there are no console errors.
           Use the existing server.py or http-server. Don't generate decorative screenshots.
        4. A short report (≤350 words) listing: changed files, the localStorage key, the
           draw sensor change in one sentence, the fake-graphic removal in one sentence,
           the smoke test path, and any known limitations.

      Take a "less is more" approach to testing and visuals — the user explicitly asked
      for fewer checks and fewer pictures. NO light/dark screenshot pairs, NO multi-viewport
      matrices, NO decorative before/after. ONE smoke check is enough. The dedicated tester
      will pick up the real visual + functional pass.
    assigned_to: 'coder'
    verified_by: 'verifier'
    verify_prompt: |
      You are the dedicated functional tester for the PuffcoBLE PWA revamp at C:\PuffcoBLE.
      The producer (coder) was asked to:
        1. Make the draw sensor work while idle AND while heating
        2. Add draggable, persisted card reordering
        3. Polish transitions / animations
        4. Fix alignment and overlap issues
        5. Remove the fake Puffco graphic

      The user explicitly asked for a dedicated tester pass AND for the team to "test less
      and take less pictures". So your bar is: a focused, decisive end-to-end check — NOT
      a screenshot tour. No light/dark pairs, no multi-viewport grid. ONE final composite
      screenshot of the running app is enough.

      DO THESE CHECKS IN ORDER. PASS only if all pass.

      CHECK A — Open the app. Serve the folder (`cd C:\PuffcoBLE; py server.py` or
      `npx http-server -p 8723 -c-1 .` if server.py is dead). Use Playwright MCP.

      CHECK B — Draw sensor: read app.js. Confirm the draw sensor handler is NOT gated
      to a single state. Either:
        - the gating branch is removed / short-circuited, OR
        - the same handler runs in both idle and heat modes.
      Confirm the draw panel is visible during a simulated heating state (you can mock
      the state via window.__puffco_test_setState if such a hook exists, OR by
      toggling the data-attribute the UI uses for "heating"). If you can't verify the
      heating path, FAIL with a clear note.

      CHECK C — Card reorder: load the page, drag a card, reload, confirm the new order
      persisted. Specifically:
        - Look in localStorage for a key matching /puffco.*cardOrder/i after dragging.
        - Reload the page, read the DOM order of the reorderable cards, confirm it
          matches the saved order, NOT the default order.
        - Drag a different card, confirm localStorage updates.
        - Confirm a "Reset layout" affordance exists and works (clears localStorage
          and reverts to default order).

      CHECK D — Fake Puffco graphic removed: search index.html and style.css for any
      image / SVG / background-image / painted div that looks like a fake Puffco device
      (e.g. a "device-halo" with a colored gradient ring around a generic pill shape, an
      <img> with puffco in src, etc.). The previous "Mac-style refresh" task left a
      .device-halo element — confirm the producer removed or repurposed it cleanly, and
      that the page header doesn't show a fake device anymore. PASS if it's gone or if
      it's been turned into a real-looking Puffco Proxy / Peak Pro silhouette (NOT a
      generic pill). FAIL with the offending selector if it's still a generic fake.

      CHECK E — Animation polish: spot-check three elements. Use page.evaluate to read
      computed style transition / animation duration on:
        1. A .btn (must be 100-300ms, Apple curve cubic-bezier(0.32, 0.72, 0, 1) or
           cubic-bezier(0.4, 0, 0.2, 1)).
        2. A .card or top-level panel (must have a transition on transform or opacity).
        3. The draw sensor visual (must pulse on draw event).
      If any of these are missing, FAIL.

      CHECK F — Alignment: at 1280x900 and 390x844 viewport, scan the page for visible
      overflow (document.body.scrollWidth > clientWidth), text clipped, or elements
      overlapping. Confirm document.body.scrollWidth === clientWidth at both viewports
      (allowing 1-2px rounding). FAIL if there's overflow or overlap you can clearly
      see in the DOM.

      CHECK G — No regressions: page loads, no console errors, BLE connect button is
      present, status badge renders, light/dark toggle still works (just toggle once,
      don't screenshot both).

      OUTPUT:
        - ONE composite screenshot at 1280x900 showing the main view with at least one
          reorderable card visibly in a non-default position. Save to
          tools/tester-final.png.
        - tools/revamp-tester-report.md with: PASS or FAIL, the localStorage key found,
          the draw sensor gate code path you inspected, the fake-graphic verdict, the
          animation timings you measured, and a 2-3 sentence overall summary.

      Do NOT modify any project files. Do NOT take a screenshot grid. ONE shot.
    max_retries: 2
    timeout_ms: 1500000
